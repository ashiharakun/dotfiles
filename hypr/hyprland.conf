# ===========================================================
# Monitor
# ===========================================================
monitor = , preferred, auto, 1

# ===========================================================
# Autostart
# ===========================================================
exec-once = waybar
exec-once = dunst
exec-once = fcitx5 -d
exec-once = nm-applet

# ===========================================================
# fcitx5 環境変数
# ===========================================================
env = GTK_IM_MODULE, fcitx
env = QT_IM_MODULE, fcitx
env = XMODIFIERS, @im=fcitx
env = SDL_IM_MODULE, fcitx

# ===========================================================
# General
# ===========================================================
general {
    gaps_in = 5
    gaps_out = 10
    border_size = 2
    col.active_border = rgba(89b4faee) rgba(cba6f7ee) 45deg
    col.inactive_border = rgba(45475aaa)
    layout = dwindle
    resize_on_border = true
}

# ===========================================================
# Decoration
# ===========================================================
decoration {
    rounding = 10
    blur {
        enabled = true
        size = 4
        passes = 2
    }
    shadow {
        enabled = true
        range = 10
        render_power = 2
        color = rgba(00000066)
    }
}

# ===========================================================
# Animations
# ===========================================================
animations {
    enabled = yes
    bezier = easeOut, 0.05, 0.9, 0.1, 1.05
    animation = windows, 1, 5, easeOut
    animation = windowsOut, 1, 5, default, popin 80%
    animation = fade, 1, 5, default
    animation = workspaces, 1, 4, default
}

# ===========================================================
# Input
# ===========================================================
input {
    kb_layout = us
    follow_mouse = 1
    sensitivity = 0
    touchpad {
        natural_scroll = yes
        disable_while_typing = yes
    }
}

# ===========================================================
# Layout
# ===========================================================
dwindle {
    pseudotile = yes
    preserve_split = yes
}

# ===========================================================
# Misc
# ===========================================================
misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
}

# ===========================================================
# Keybindings
# ===========================================================
$mod = SUPER
$terminal = ghostty
$launcher = wofi --show drun

# 基本操作
bind = $mod, Return, exec, $terminal
bind = $mod, Space, exec, $launcher
bind = $mod, Q, killactive
bind = $mod SHIFT, E, exit
bind = $mod, F, fullscreen
bind = $mod, V, togglefloating
bind = $mod, P, pseudo     # dwindle pseudotile

# フォーカス移動（vi キー）
bind = $mod, H, movefocus, l
bind = $mod, L, movefocus, r
bind = $mod, K, movefocus, u
bind = $mod, J, movefocus, d

# ウィンドウ移動
bind = $mod SHIFT, H, movewindow, l
bind = $mod SHIFT, L, movewindow, r
bind = $mod SHIFT, K, movewindow, u
bind = $mod SHIFT, J, movewindow, d

# ウィンドウリサイズ
bind = $mod CTRL, H, resizeactive, -40 0
bind = $mod CTRL, L, resizeactive, 40 0
bind = $mod CTRL, K, resizeactive, 0 -40
bind = $mod CTRL, J, resizeactive, 0 40

# ワークスペース切り替え
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9
bind = $mod, 0, workspace, 10

# ウィンドウをワークスペースへ移動
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9
bind = $mod SHIFT, 0, movetoworkspace, 10

# スクロールでワークスペース移動
bind = $mod, mouse_down, workspace, e+1
bind = $mod, mouse_up, workspace, e-1

# スクリーンショット（grim + slurp）
bind = , Print, exec, grim ~/Pictures/screenshot-$(date +%Y%m%d-%H%M%S).png
bind = $mod, Print, exec, grim -g "$(slurp)" ~/Pictures/screenshot-$(date +%Y%m%d-%H%M%S).png

# マウスでウィンドウ操作
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow
